name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:once

      - name: Build
        run: npm run build

      - name: Smoke MCP stdio
        run: npm run smoke:mcp
        env:
          DATABENTO_API_KEY: db-test-key

      - name: Smoke MCP Streamable HTTP
        run: npm run smoke:mcp:http
        env:
          DATABENTO_API_KEY: db-test-key
          MCP_REMOTE_AUTH_TOKEN: ci-http-smoke-token

      - name: Smoke installed skills
        run: npm run smoke:skills

      - name: Smoke consumer artifacts
        run: npm run smoke:consumer

  windows-consumer-smoke:
    name: Windows consumer artifact smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke consumer artifacts
        run: npm run smoke:consumer
